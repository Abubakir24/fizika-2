<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizika II – Yakuniy Test</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── DARK THEME (default) ── */
  [data-theme="dark"] {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --finish: #f97316;
    --finish2: #fb923c;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --star-opacity: 0.3;
    --shadow: rgba(0,0,0,0.4);
    --header-bg: rgba(10,14,26,0.95);
  }
  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #f1f5fb;
    --border: #d1dbed;
    --accent: #2563eb;
    --accent2: #3b82f6;
    --green: #059669;
    --red: #dc2626;
    --yellow: #d97706;
    --finish: #ea580c;
    --finish2: #f97316;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --star-opacity: 0;
    --shadow: rgba(0,0,0,0.1);
    --header-bg: rgba(240,244,255,0.97);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star {
    position: absolute; width: 2px; height: 2px; background: white;
    border-radius: 50%; opacity: var(--star-opacity);
    animation: twinkle 3s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.5; } }

  #app { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }

  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── THEME TOGGLE ── */
  .theme-btn {
    position: fixed; top: 14px; right: 16px; z-index: 999;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── LANDING ── */
  #screen-landing {
    align-items: center; justify-content: center;
    padding: 40px 20px; gap: 32px;
  }
  .logo-badge { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo-icon {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: 0 0 40px rgba(59,130,246,0.3);
    animation: pulse-glow 2.5s infinite alternate;
  }
  @keyframes pulse-glow {
    from { box-shadow: 0 0 20px rgba(59,130,246,0.2); }
    to   { box-shadow: 0 0 50px rgba(59,130,246,0.45); }
  }
  .logo-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { font-size: 13px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }

  .landing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    max-width: 460px; width: 100%;
    box-shadow: 0 8px 32px var(--shadow);
  }
  .landing-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .landing-card p { color: var(--text2); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .info-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .info-item .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .info-item .val { font-size: 18px; font-weight: 600; color: var(--accent2); font-family: 'IBM Plex Mono', monospace; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
  .form-group input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; font-size: 15px;
    font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text3); }
  .btn-start {
    width: 100%; background: linear-gradient(135deg, var(--accent), #7c3aed);
    border: none; border-radius: 10px; padding: 13px;
    font-size: 15px; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s;
  }
  .btn-start:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.35); }

  /* ── TEST SCREEN ── */
  #screen-test { padding: 0; }

  .test-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  /* Top row: name + timer */
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0 8px;
    gap: 12px;
  }
  .header-name { font-size: 13px; font-weight: 600; color: var(--text2); }
  .timer {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 12px;
    font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600;
    transition: all 0.3s; white-space: nowrap;
  }
  .timer.warning { border-color: var(--yellow); color: var(--yellow); }
  .timer.danger   { border-color: var(--red);    color: var(--red);    animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* Q-number pills row */
  .q-numbers-row {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 6px 0 10px;
    justify-content: flex-start;
  }
  .qnum-pill {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    font-size: 12px; font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .qnum-pill:hover   { border-color: var(--accent2); color: var(--accent2); }
  .qnum-pill.answered { background: rgba(59,130,246,0.18); border-color: var(--accent); color: var(--accent2); }
  .qnum-pill.current  { background: var(--accent); border-color: var(--accent); color: white; }
  .qnum-pill.correct  { background: rgba(16,185,129,0.2); border-color: var(--green); color: var(--green); }
  .qnum-pill.wrong    { background: rgba(239,68,68,0.15);  border-color: var(--red);   color: var(--red); }

  /* thin progress bar */
  .progress-strip { height: 3px; background: var(--border); }
  .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), #7c3aed); transition: width 0.4s ease; }

  /* ── TEST BODY ── */
  .test-body { padding: 20px 20px 100px; }

  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 26px;
    max-width: 700px; margin: 0 auto;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .q-num {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: white; font-size: 12px; font-weight: 600;
    border-radius: 7px; padding: 3px 9px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .q-badge { font-size: 11px; font-weight: 500; border-radius: 5px; padding: 3px 7px; }
  .badge-easy { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-med  { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
  .badge-hard { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
  .q-points   { margin-left: auto; font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

  .q-text { font-size: 15px; line-height: 1.75; margin-bottom: 22px; }
  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    text-align: left; cursor: pointer;
    font-family: inherit; font-size: 14px; color: var(--text);
    display: flex; align-items: flex-start; gap: 10px;
    transition: all 0.18s; line-height: 1.5;
  }
  .choice-btn:hover:not(.disabled) { border-color: var(--accent); background: rgba(59,130,246,0.07); }
  .choice-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.13); }
  .choice-btn.correct  { border-color: var(--green);  background: rgba(16,185,129,0.12); color: var(--green); }
  .choice-btn.wrong    { border-color: var(--red);    background: rgba(239,68,68,0.10);  color: var(--red); opacity: 0.85; }
  .choice-btn.disabled { cursor: default; }
  .choice-letter {
    min-width: 24px; height: 24px; border: 1px solid var(--text3);
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0; margin-top: 1px; transition: all 0.18s;
  }
  .choice-btn.selected .choice-letter { background: var(--accent);  border-color: var(--accent);  color: white; }
  .choice-btn.correct  .choice-letter { background: var(--green);   border-color: var(--green);   color: white; }
  .choice-btn.wrong    .choice-letter { background: var(--red);     border-color: var(--red);     color: white; }

  /* ── BOTTOM NAV ── */
  .test-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
    max-width: 100%;
  }
  .btn-nav {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 18px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text); cursor: pointer; transition: all 0.18s;
  }
  .btn-nav:hover    { border-color: var(--accent); color: var(--accent2); }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-nav.next-btn {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    border: none; color: white;
  }
  .btn-nav.next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.35); }

  /* FINISH button – orange, always visible, right side */
  .btn-finish {
    margin-left: auto;
    background: linear-gradient(135deg, var(--finish), #dc2626);
    border: none; border-radius: 9px;
    padding: 9px 18px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    color: white; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(249,115,22,0.35);
  }
  .btn-finish:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(249,115,22,0.5); }

  /* ── RESULT ── */
  #screen-result { align-items: center; justify-content: center; padding: 40px 20px 80px; gap: 0; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px;
    max-width: 500px; width: 100%; text-align: center;
    box-shadow: 0 8px 32px var(--shadow);
  }
  .result-icon {
    width: 76px; height: 76px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin: 0 auto 16px;
  }
  .result-icon.pass { background: rgba(16,185,129,0.18); }
  .result-icon.fail { background: rgba(239,68,68,0.14); }
  .result-card h2   { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .result-score-wrap {
    margin: 20px 0; padding: 18px;
    background: var(--surface2); border-radius: 12px; border: 1px solid var(--border);
  }
  .result-score-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .result-score {
    font-size: 54px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; line-height: 1;
  }
  .result-score.pass-color { color: var(--green); }
  .result-score.fail-color { color: var(--red); }
  .result-score-max { font-size: 18px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .result-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px; }
  .result-stat .s-val { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .result-stat .s-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .result-msg {
    font-size: 13px; line-height: 1.6; color: var(--text2);
    border-radius: 10px; padding: 13px 15px; margin-bottom: 20px;
    background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
  }
  .result-msg.pass-msg { background: rgba(16,185,129,0.07); border-color: rgba(16,185,129,0.2); }
  .btn-action {
    width: 100%; border-radius: 10px;
    padding: 13px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-bottom: 10px;
    font-family: inherit;
  }
  .btn-action.primary { background: linear-gradient(135deg, var(--accent), #7c3aed); border: none; color: white; }
  .btn-action.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-action:hover { transform: translateY(-1px); }

  .footer {
    padding: 14px 20px; text-align: center;
    font-size: 12px; color: var(--text3);
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
  }
  .footer span { color: var(--accent2); }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="stars" id="stars-bg"></div>

<!-- Theme toggle -->
<button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 Qorong'i</button>

<div id="app">
  <!-- ── LANDING ── -->
  <div id="screen-landing" class="screen active">
    <div class="logo-badge fade-in">
      <div class="logo-icon">⚛</div>
      <div class="logo-title">FIZIKA II</div>
      <div class="logo-sub">TATU · Yakuniy Nazorat Testi</div>
    </div>
    <div class="landing-card fade-in">
      <h2>Test haqida ma'lumot</h2>
      <p>Ushbu test II semestr fizika fanidan bilimingizni tekshiradi. Test boshlangach vaqtni to'xtatib bo'lmaydi.</p>
      <div class="info-grid">
        <div class="info-item"><div class="lbl">Savollar</div><div class="val">18 ta</div></div>
        <div class="info-item"><div class="lbl">Vaqt</div><div class="val">60 min</div></div>
        <div class="info-item"><div class="lbl">Maks. ball</div><div class="val">50</div></div>
        <div class="info-item"><div class="lbl">O'tish bali</div><div class="val">30</div></div>
      </div>
      <div class="form-group">
        <label>Ism va familiyangizni kiriting</label>
        <input type="text" id="student-name" placeholder="Masalan: Aminjonov Abubakir" autocomplete="off">
      </div>
      <button class="btn-start" onclick="startTest()">Testni boshlash →</button>
    </div>
  </div>

  <!-- ── TEST ── -->
  <div id="screen-test" class="screen">
    <div class="test-header">
      <div class="header-top">
        <div class="header-name" id="header-name">—</div>
        <div class="timer" id="timer">⏱ 60:00</div>
      </div>
      <!-- Q number pills -->
      <div class="q-numbers-row" id="q-numbers-row"></div>
      <!-- progress strip -->
      <div class="progress-strip"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
    </div>

    <div class="test-body">
      <div class="question-card fade-in" id="question-card"></div>
    </div>

    <!-- Fixed bottom nav -->
    <div class="test-bottom">
      <button class="btn-nav" id="btn-prev" onclick="goPrev()">← Oldingi</button>
      <button class="btn-nav next-btn" id="btn-next" onclick="goNext()">Keyingi →</button>
      <button class="btn-finish" onclick="onFinishClick()">✓ Yakunlash</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div id="screen-result" class="screen">
    <div class="result-card fade-in" id="result-card"></div>
  </div>

  <div class="footer">TATU · Fizika II · <span>Aminjonov Abubakir</span></div>
</div>

<script>
// ══════════════ QUESTION BANK ══════════════
const QUESTIONS = {
  easy: [
    { id:"e1",  q:"Muhit sindirish ko'rsatkichining tushayotgan yorug'lik chastotasiga bog'liqligi … deb ataladi.", opts:["Interferensiya","Dispersiya","Polyarisatsiya","Fotoeffekt"], ans:1 },
    { id:"e2",  q:"Quyidagi tabiat hodisalaridan qaysi biri yorug'lik dispersiyasi bilan tushuntiriladi?", opts:["Kamalak hosil bo'lishi","Yarim soya hosil bo'lishi","Sadaf idishda ranglarning o'ynashi","Sovun pufagining kamalak ranglariga bo'yalishi"], ans:0 },
    { id:"e3",  q:"Shaffof muhitda tarqalayotgan ko'zga ko'rinuvchi yorug'lik to'lqinlaridan qaysi birining tezligi eng katta bo'ladi?", opts:["Binafsha","Qizil","Ko'k","Sariq"], ans:1 },
    { id:"e4",  q:"Quyida keltirilgan qaysi nurlar uchun yig'uvchi linzaning fokus masofasi eng katta bo'ladi?", opts:["Ko'k","Yashil","Qizil","Binafsha"], ans:2 },
    { id:"e5",  q:"Yorug'lik rangi uning qaysi parametriga bog'liq?", opts:["Amplituda","Chastota","Tezlik","To'lqin uzunligi"], ans:1 },
    { id:"e6",  q:"Zangori shisha orqali qizil qog'ozga qaralsa, u qanday rangda ko'rinadi?", opts:["Qora","Qizil","Ko'k","Yashil"], ans:0 },
    { id:"e7",  q:"Turmalin kristallardan tabiiy nur o'tganda, uning intensivligi bo'yicha qanday maksimal qismi qutblangan nur bo'lib o'tadi?", opts:["0,75","0,5","0,25","0,125"], ans:1 },
    { id:"e8",  q:"Yorug'lik to'lqini bo'ylama to'lqinmi yoki ko'ndalang to'lqin?", opts:["Bo'ylama","Ham ko'ndalang, ham bo'ylama","Ko'ndalang","To'lqin uzunligiga bog'liq"], ans:2 },
    { id:"e9",  q:"Quyidagi hodisalardan qaysi biri yorug'lik to'lqinining ko'ndalangligini tasdiqlaydi?", opts:["Qutblanish","Difraksiya","Interferensiya","Dispersiya"], ans:0 },
    { id:"e10", q:"Quyidagi to'lqinlarning qaysi birlari qutblanish xususiyatiga ega: 1) tovush to'lqini; 2) radiotо'lqin; 3) yorug'lik to'lqini?", opts:["Faqat 1","Faqat 2","Faqat 3","2 va 3"], ans:3 },
    { id:"e11", q:"Yorug'lik to'lqinlarining tarqalishda to'g'ri chiziqdan og'ishi va to'siqni aylanib soya sohasiga o'tishi … deb ataladi.", opts:["Interferensiya","Qutblanish","Dispersiya","Difraksiya"], ans:3 },
    { id:"e12", q:"Keltirilgan hodisalardan qaysilari yorug'likning to'lqin nazariyasi asosida tushuntiriladi: 1) interferensiya; 2) difraksiya; 3) fotoeffekt; 4) qutblanish?", opts:["1, 2, 3","2, 3","1, 2, 4","3, 4"], ans:2 },

    { id:"h22", q:"Pechning harorati T=1200 K bo'lsa, yuzasi S=8 cm² bo'lgan eritish pechining tuynugidan t=1 min vaqtda sochiladigan W energiya aniqlansin (kJ).", opts:["6,67","5,87","4,33","3,65"], ans:0 },

    { id:"h24", q:"Elektromagnit to'lqin nomagnit bo'lgan muhitga o'tishida ε=4, vakuumda to'lqin uzunligi Δλ=50 m ga oshdi. Tebranish chastotasini aniqlang (MHz). (c=3·10⁸ m/s)", opts:["1","2","3","4"], ans:2 },
    { id:"h25", q:"Bitta tirqishdan hosil bo'lgan difraksiyaning minimumlik sharti (a - tirqish kengligi, k=1,2,3…)?", opts:["a·sinφ = kλ","a·sinφ = (2k+1)λ/2","a·sinφ = (2k+1)λ","a·sinφ = kλ/2"], ans:0 },

// ══════════════ STATE ══════════════
let studentName = "";
let testQuestions = [];
let userAnswers = [];
let currentQ = 0;
let timerInterval = null;
let secondsLeft = 3600;
let testFinished = false;

// ══════════════ THEME ══════════════
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 Qorong\'i' : '☀ Yorug\'';
  // hide/show stars
  document.querySelector('.stars').style.display = isDark ? '' : 'none';
}

// ══════════════ STORAGE ══════════════
async function getUsed(pool) {
  try { const r = await window.storage.get('used_' + pool); return r ? JSON.parse(r.value) : []; } catch { return []; }
}
async function saveUsed(pool, arr) {
  try { await window.storage.set('used_' + pool, JSON.stringify(arr)); } catch {}
}

// ══════════════ PICK QUESTIONS ══════════════
async function pickQuestions() {
  const eUsed = await getUsed('easy');
  const mUsed = await getUsed('medium');
  const hUsed = await getUsed('hard');

  function pick(pool, usedIds, count) {
    let avail = pool.filter(q => !usedIds.includes(q.id));
    if (avail.length < count) avail = pool.slice();
    const selected = [];
    const tempAvail = avail.slice();
    while (selected.length < count && tempAvail.length > 0) {
      const ri = Math.floor(Math.random() * tempAvail.length);
      selected.push(tempAvail.splice(ri, 1)[0]);
    }
    return selected;
  }

  const easyPicked  = pick(QUESTIONS.easy,   eUsed, 6);
  const medPicked   = pick(QUESTIONS.medium,  mUsed, 10);
  const hardPicked  = pick(QUESTIONS.hard,    hUsed, 2);

  const newE = [...eUsed, ...easyPicked.map(q => q.id)];
  const newM = [...mUsed, ...medPicked.map(q => q.id)];
  const newH = [...hUsed, ...hardPicked.map(q => q.id)];
  await saveUsed('easy',   newE.length > QUESTIONS.easy.length * 2   ? easyPicked.map(q=>q.id) : newE);
  await saveUsed('medium', newM.length > QUESTIONS.medium.length * 2  ? medPicked.map(q=>q.id)  : newM);
  await saveUsed('hard',   newH.length > QUESTIONS.hard.length * 2    ? hardPicked.map(q=>q.id)  : newH);

  return [
    ...easyPicked.map(q => ({ ...q, points: 2, diff: 'easy' })),
    ...medPicked.map(q  => ({ ...q, points: 3, diff: 'medium' })),
    ...hardPicked.map(q => ({ ...q, points: 4, diff: 'hard' })),
  ];
}

// ══════════════ UI ══════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function formatTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// ══════════════ TIMER ══════════════
function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = '⏱ ' + formatTime(secondsLeft);
  el.className = 'timer';
  if (secondsLeft <= 600) el.classList.add('warning');
  if (secondsLeft <= 120) el.classList.add('danger');
  if (secondsLeft <= 0) { clearInterval(timerInterval); finishTest(); return; }
  secondsLeft--;
}

// ══════════════ START ══════════════
async function startTest() {
  const nameEl = document.getElementById('student-name');
  const name = nameEl.value.trim();
  if (!name) {
    nameEl.style.borderColor = 'var(--red)';
    nameEl.placeholder = '⚠ Ism kiriting!';
    setTimeout(() => { nameEl.style.borderColor = ''; nameEl.placeholder = 'Masalan: Aminjonov Abubakir'; }, 2000);
    return;
  }
  studentName = name;
  testQuestions = await pickQuestions();
  userAnswers = new Array(18).fill(-1);
  currentQ = 0;
  secondsLeft = 3600;
  testFinished = false;

  document.getElementById('header-name').textContent = '👤 ' + studentName;
  buildQNumbers();
  show('screen-test');
  renderQuestion();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

// ══════════════ Q-NUMBER PILLS ══════════════
function buildQNumbers() {
  const row = document.getElementById('q-numbers-row');
  row.innerHTML = testQuestions.map((_, i) =>
    `<button class="qnum-pill${i===0?' current':''}" id="qp-${i}" onclick="jumpTo(${i})">${i+1}</button>`
  ).join('');
}

function updateQNumbers() {
  testQuestions.forEach((q, i) => {
    const el = document.getElementById('qp-' + i);
    if (!el) return;
    let cls = 'qnum-pill';
    if (testFinished) {
      if (userAnswers[i] === q.ans) cls += ' correct';
      else if (userAnswers[i] !== -1) cls += ' wrong';
      else if (i === currentQ) cls += ' current';
    } else {
      if (i === currentQ) cls += ' current';
      else if (userAnswers[i] !== -1) cls += ' answered';
    }
    el.className = cls;
  });
}

// ══════════════ RENDER QUESTION ══════════════
function renderQuestion() {
  const q = testQuestions[currentQ];
  document.getElementById('progress-bar').style.width = (currentQ / testQuestions.length * 100) + '%';

  const diffLabel =
    q.diff === 'easy'   ? '<span class="q-badge badge-easy">Oson · 2 ball</span>' :
    q.diff === 'medium' ? '<span class="q-badge badge-med">O\'rta · 3 ball</span>' :
                          '<span class="q-badge badge-hard">Qiyin · 4 ball</span>';

  const html = `
    <div class="q-meta">
      <span class="q-num">Savol ${currentQ + 1}</span>
      ${diffLabel}
    </div>
    <div class="q-text">${q.q}</div>
    <div class="choices">
      ${['A','B','C','D'].map((ltr, i) => {
        let cls = 'choice-btn';
        if (testFinished) {
          cls += ' disabled';
          if (i === q.ans) cls += ' correct';
          else if (userAnswers[currentQ] === i) cls += ' wrong';
        } else {
          if (userAnswers[currentQ] === i) cls += ' selected';
        }
        return `<button class="${cls}" onclick="selectAnswer(${i})">
          <span class="choice-letter">${ltr}</span>
          <span>${q.opts[i]}</span>
        </button>`;
      }).join('')}
    </div>
  `;

  const card = document.getElementById('question-card');
  card.innerHTML = html;
  card.className = 'question-card fade-in';

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentQ === 0;
  const isLast = currentQ === testQuestions.length - 1;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? 'Yakunlash ✓' : 'Keyingi →';

  updateQNumbers();
}

function selectAnswer(i) {
  if (testFinished) return;
  userAnswers[currentQ] = i;
  renderQuestion();
}

function jumpTo(i) { currentQ = i; renderQuestion(); }
function goPrev()  { if (currentQ > 0) { currentQ--; renderQuestion(); } }
function goNext()  {
  if (testFinished) { if (currentQ < 17) { currentQ++; renderQuestion(); } return; }
  if (currentQ < testQuestions.length - 1) { currentQ++; renderQuestion(); }
  else finishTest();
}

// ══════════════ FINISH ══════════════
function onFinishClick() {
  // No confirm – just finish immediately
  finishTest();
}

function finishTest() {
  clearInterval(timerInterval);
  testFinished = true;
  renderQuestion();
  showResult();
}

// ══════════════ RESULT ══════════════
function showResult() {
  let score = 0, correct = 0;
  testQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.ans) { score += q.points; correct++; }
  });
  const pass = score >= 30;
  const pct  = Math.round(score / 50 * 100);

  document.getElementById('result-card').innerHTML = `
    <div class="result-icon ${pass?'pass':'fail'}">${pass?'🎉':'📚'}</div>
    <h2>${pass ? 'Tabriklaymiz!' : 'Test yakunlandi'}</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:18px;">👤 ${studentName}</p>
    <div class="result-score-wrap">
      <div class="result-score-label">Yig'ilgan ball</div>
      <div class="result-score ${pass?'pass-color':'fail-color'}">${score}<span class="result-score-max"> / 50</span></div>
      <div style="margin-top:6px;font-size:12px;color:var(--text3);">O'tish bali: 30 · Natija: ${pct}%</div>
    </div>
    <div class="result-stats">
      <div class="result-stat"><div class="s-val" style="color:var(--green)">${correct}</div><div class="s-lbl">To'g'ri</div></div>
      <div class="result-stat"><div class="s-val" style="color:var(--red)">${18-correct}</div><div class="s-lbl">Noto'g'ri</div></div>
      <div class="result-stat"><div class="s-val" style="color:var(--accent2)">${18 - userAnswers.filter(a=>a!==-1).length}</div><div class="s-lbl">Javobsiz</div></div>
    </div>
    <div class="result-msg ${pass?'pass-msg':''}">
      ${pass
        ? `✅ Siz testdan muvaffaqiyatli o'tdingiz! ${score} ball yig'ib, ${pct}% natija ko'rsatdingiz. Ajoyib!`
        : `❌ Ko'proq o'qing va o'z ustingizda ishlang! Siz ${score} ball yig'dingiz – o'tish uchun kamida 30 ball kerak edi.`
      }
    </div>
    <button class="btn-action primary" onclick="reviewTest()">Xatolarni ko'rish 🔍</button>
    <button class="btn-action secondary" onclick="restartTest()">Qayta boshlash ↺</button>
  `;
  show('screen-result');
}

function reviewTest() {
  currentQ = 0;
  show('screen-test');
  renderQuestion();
  updateQNumbers();
}
function restartTest() {
  clearInterval(timerInterval);
  document.getElementById('student-name').value = '';
  show('screen-landing');
}

// ══════════════ STARS ══════════════
(function() {
  const wrap = document.getElementById('stars-bg');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(Math.random()*3).toFixed(1)}s;animation-duration:${(2+Math.random()*3).toFixed(1)}s`;
    wrap.appendChild(s);
  }
})();
</script>
